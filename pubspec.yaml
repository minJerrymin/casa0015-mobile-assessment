name: matchpint
version: 1.0.2+23
description: A Flutter matchday companion that helps football fans find the right pub to watch the right match.
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  http: ^1.2.2
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  geolocator: ^14.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  record: ^6.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/launcher/

flutter_native_splash:
  color: "#101114"
  image: assets/branding/matchpint_logo.png
  android: true
  ios: false
  web: false
  android_12:
    color: "#101114"
    image: assets/branding/matchpint_logo.png
